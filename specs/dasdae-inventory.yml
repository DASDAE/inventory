id: dasdae-inventory
title: DASDAE Inventory
direction: TB
reference_label: resolves
legend:
  - label: Inventory boundary
    description: Top-level manifest and patch lookup entrypoint.
    style:
      fill: "#e7f5ff"
      stroke: "#0b7285"
      color: "#102a43"
  - label: Reusable resources
    description: Shared objects keyed by stable resource_id values.
    style:
      fill: "#ebfbee"
      stroke: "#2f9e44"
      color: "#1b4332"
  - label: Patch-local metadata
    description: Patch state that resolves inventory context on demand.
    style:
      fill: "#fff4e6"
      stroke: "#f08c00"
      color: "#5c3d00"
nodes:
  Inv:
    label: Inventory
    style:
      fill: "#e7f5ff"
      stroke: "#0b7285"
      color: "#102a43"
    summary: Top-level FAS Inventory manifest that stores document metadata, shared resources, and network containers.
    attributes:
      - name: schema_version
        type: int
        description: Version of the FAS Inventory manifest envelope.
      - name: resource_id
        type: str
        description: Optional identifier for the inventory manifest.
      - name: creation_info
        type: CreationInfo
        description: QuakeML-style creation and update metadata.
      - name: resources
        type: dict[str, _PublicInventoryItem]
        description: Shareable resources keyed by resource_id.
      - name: networks
        type: tuple[Network, ...]
        description: Network containers in the inventory.
  Refs:
    label: References
    style:
      fill: "#ebfbee"
      stroke: "#2f9e44"
      color: "#1b4332"
    summary: Shareable inventory resources keyed by stable resource_id values.
    attributes:
      - name: resources
        type: dict[str, _PublicInventoryItem]
        description: Shareable resource objects stored by resource_id.
      - name: resource_id
        type: str
        description: Stable identifier used by nested inventory items to refer to a resource.
      - name: members
        type: Interrogator | Cable | Enclosure | CoordinateReferenceSystem | ExternalResource
        description: Resource-id objects that can be reused across the inventory tree.
  Net:
    label: Network
    summary: FDSN-like organizational container below an inventory.
    attributes:
      - name: code
        type: str
        description: Network code.
      - name: name
        type: str
        description: Human-readable network name.
      - name: description
        type: str
        description: Network description.
      - name: fiber_arrays
        type: tuple[FiberArray, ...]
        description: Fiber arrays associated with this network.
      - name: comment
        type: str
        description: Additional comments.
  FA:
    label: FiberArray
    summary: Durable fiber-optic observing identity anchored by one or more optical paths.
    attributes:
      - name: code
        type: str
        description: Station-like fiber array code used in data_source_id.
      - name: name
        type: str
        description: Human-readable fiber array name.
      - name: start_time
        type: datetime64
        description: Start time for which this metadata item is valid.
      - name: end_time
        type: datetime64
        description: End time for which this metadata item is valid.
      - name: acquisitions
        type: tuple[Acquisition, ...]
        description: Acquisitions associated with this fiber array.
      - name: optical_paths
        type: tuple[OpticalPath, ...]
        description: Optical paths associated with this fiber array.
      - name: comment
        type: str
        description: Additional comments.
  Acq:
    label: Acquisition
    display: Acquisition
    summary: Time-aware, channel-like DAS acquisition setup used to resolve acquisition-derived patch metadata.
    attributes:
      - name: code
        type: str
        description: Channel-like acquisition code used in data_source_id.
      - name: location_code
        type: str
        description: FDSN-style location code used to group or disambiguate acquisitions.
      - name: data_type
        type: Literal[VALID_DATA_TYPES]
        description: Quantity measured or produced by this acquisition.
      - name: data_category
        type: str
        description: Acquisition family such as DAS, DTS, or DSS.
      - name: data_units
        type: UnitQuantity | None
        description: Units of data produced by this acquisition.
      - name: interrogator
        type: Interrogator | None
        description: Interrogator used for this acquisition.
      - name: gauge_length
        type: float | None
        description: Gauge length used by the acquisition in meters.
      - name: pulse_rate
        type: float | None
        description: Pulse repetition rate in Hz.
      - name: pulse_width
        type: float | None
        description: Pulse width in seconds.
      - name: acquisition_sample_rate
        type: float | None
        description: FDSN-style acquisition sample rate in Hz.
      - name: spatial_sampling_interval
        type: float | None
        description: Spatial sampling interval between channels in meters.
      - name: first_channel_distance
        type: float
        description: Optical path distance corresponding to channel or index position 0.
      - name: closed_fiber_loop
        type: bool
        description: True when the interrogator is attached to both ends of the optical path.
      - name: extra_fields
        type: dict[str, str | int | float | bool]
        description: Extra acquisition metadata not represented by standardized fields.
  Int:
    label: Interrogator
    display: Interrogator
    summary: DAS interrogator unit used for data collection.
    attributes:
      - name: resource_id
        type: str
        description: Stable identifier for this shareable inventory resource.
      - name: name
        type: str
        description: Human-readable resource name.
      - name: manufacturer
        type: str
        description: Manufacturer name of the interrogator.
      - name: model
        type: str
        description: Model number of the interrogator.
      - name: serial_number
        type: str
        description: Serial number of the interrogator.
      - name: instrument_type
        type: str
        description: General instrument category.
      - name: lead_cable_length
        type: float
        description: Lead cable length for the interrogator.
      - name: take_in_cable_length
        type: float
        description: Take-in cable length for closed-loop systems.
  Cable:
    label: Cable
    summary: Physical cable resource containing one or more fiber segments.
    attributes:
      - name: resource_id
        type: str
        description: Stable identifier for this shareable inventory resource.
      - name: name
        type: str
        description: Human-readable cable name.
      - name: owner
        type: str
        description: Proprietary owner of the cable.
      - name: manufacturer
        type: str
        description: Manufacturer of the cable.
      - name: model
        type: str
        description: Model name of the cable.
      - name: serial_number
        type: str
        description: Manufacturer serial number for the cable.
      - name: specification
        type: ExternalResource | None
        description: External cable specification, datasheet, or product page.
      - name: fiber_count
        type: int | None
        description: Number of fibers contained in the cable.
  Enclosure:
    label: Enclosure
    summary: Physical housing resource for optical components.
    attributes:
      - name: resource_id
        type: str
        description: Stable identifier for this shareable inventory resource.
      - name: name
        type: str
        description: Human-readable enclosure name.
      - name: owner
        type: str
        description: Proprietary owner of the enclosure.
      - name: manufacturer
        type: str
        description: Manufacturer of the enclosure.
      - name: model
        type: str
        description: Model name of the enclosure.
      - name: serial_number
        type: str
        description: Manufacturer serial number for the enclosure.
      - name: specification
        type: ExternalResource | None
        description: External enclosure specification, datasheet, or product page.
  CRS:
    label: CoordinateReferenceSystem
    display: CRS
    summary: Coordinate reference system resource used by optical path geometries.
    attributes:
      - name: resource_id
        type: str
        description: Stable identifier for this shareable inventory resource.
      - name: authority
        type: str
        description: CRS authority such as EPSG, OGC, CF, or LOCAL.
      - name: code
        type: str
        description: Authority code or local project code.
      - name: name
        type: str
        description: Human-readable CRS name.
      - name: axis_order
        type: tuple[str, ...]
        description: Coordinate axis order, such as latitude, longitude, elevation or x, y, z.
      - name: units
        type: str
        description: Coordinate units when known.
      - name: vertical_datum
        type: str
        description: Vertical datum or reference surface, if known.
  Ext:
    label: ExternalResource
    display: External resource
    summary: External resource identified by DASCore but not otherwise modeled.
    attributes:
      - name: resource_id
        type: str
        description: Stable identifier for this shareable inventory resource.
      - name: uri
        type: str
        description: URI or identifier for the resource.
      - name: name
        type: str
        description: Human-readable resource name.
      - name: description
        type: str
        description: Free-form description of the external resource.
  Path:
    label: OpticalPath
    summary: Continuous optical path described by independent component, geometry, coupling, and annotation tracks.
    attributes:
      - name: name
        type: str
        description: Human-readable optical path name.
      - name: start_time
        type: datetime64
        description: Start time for which this metadata item is valid.
      - name: end_time
        type: datetime64
        description: End time for which this metadata item is valid.
      - name: crs
        type: CoordinateReferenceSystem
        description: Coordinate reference system shared by geometries on this path.
      - name: optical_components
        type: tuple[OpticalComponent, ...]
        description: Ordered optical components on this path.
      - name: geometries
        type: tuple[Geometry, ...]
        description: Ordered geometries on this path.
      - name: coupling_conditions
        type: tuple[CouplingCondition, ...]
        description: Ordered coupling conditions on this path.
      - name: annotations
        type: tuple[OpticalPathAnnotation, ...]
        description: Ordered optical path annotations.
      - name: otdr_traces
        type: tuple[ExternalResource, ...]
        description: References to OTDR traces for this optical path.
      - name: optical_length
        type: float
        description: Computed total optical length from optical_components.
  Comp:
    label: OpticalComponent
    display: Components
    summary: Base class for ordered physical optical components on an optical path.
    attributes:
      - name: optical_length
        type: float
        description: Optical component length along the optical path in meters.
      - name: name
        type: str
        description: Human-readable component name.
      - name: container
        type: Cable | Enclosure | None
        description: Optional physical container housing this optical component.
      - name: subclasses
        type: FiberSegment | Connector | Splice | Coupler | Turnaround | Terminator
        description: Common concrete component types supported by DASCore.
  Geo:
    label: Geometry
    display: Geometry
    summary: Geometry for an interval of an optical path, interpreted using the path CRS.
    attributes:
      - name: optical_length
        type: float
        description: Optical path interval length in meters.
      - name: name
        type: str
        description: Human-readable geometry name.
      - name: distance
        type: tuple[float]
        description: Optical distances paired to coordinates.
      - name: coordinates
        type: tuple[tuple[float, ...], ...]
        description: Coordinate points describing the geometry.
  Coup:
    label: CouplingCondition
    display: Coupling
    summary: Acoustic coupling condition for an interval of an optical path.
    attributes:
      - name: optical_length
        type: float
        description: Optical path interval length described by this coupling in meters.
      - name: coupling_type
        type: Literal
        description: Kind of acoustic coupling, such as conduit, trench, outside borehole casing, clamp, or wireline.
      - name: medium
        type: str
        description: Surrounding medium, such as soil, rock, or steel.
      - name: attachment
        type: str
        description: Attachment method, such as clamped or bonded.
  Ann:
    label: OpticalPathAnnotation
    display: Annotations
    summary: Named interval on an optical path.
    attributes:
      - name: distance
        type: tuple[float | None, float | None]
        description: Optical distance interval for this annotation.
      - name: label
        type: str
        description: Human-readable label for this path annotation.
      - name: comment
        type: str
        description: Additional comments.
  Patch:
    label: PatchAttrs
    style:
      fill: "#fff4e6"
      stroke: "#f08c00"
      color: "#5c3d00"
    summary: Patch-local metadata snapshot that resolves inventory context through network, fiber_array, location, and acquisition.
    attributes:
      - name: data_units
        type: UnitQuantity | None
        description: Units of the patch data measurements.
      - name: tag
        type: str
        description: Custom patch tag.
      - name: network
        type: str
        description: Network code.
      - name: fiber_array
        type: str
        description: Fiber array code.
      - name: location
        type: str
        description: Location code within a fiber array.
      - name: acquisition
        type: str
        description: Acquisition code.
      - name: data_source_id
        type: str
        description: Computed network.fiber_array.location.acquisition identifier.
      - name: history
        type: str | tuple[str, ...]
        description: Processing performed on the patch.
edges:
  - [Inv, Net]
  - [Inv, Refs]
  - [Refs, Int]
  - [Refs, Cable]
  - [Refs, Enclosure]
  - [Refs, CRS]
  - [Refs, Ext]
  - [Net, FA]
  - [FA, Acq]
  - [FA, Path]
  - [Path, Comp]
  - [Path, Geo]
  - [Path, Coup]
  - [Path, Ann]
references:
  - [Patch, FA]
  - [Patch, Acq]
